<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - Dealzo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h1>Dealzo</h1>
            </div>
            <div class="nav-links">
                <a href="home.html">Home</a>
                <a href="#" id="login-link">Login</a>
                <a href="#" id="register-link">Register</a>
                <a href="#" id="guest-link">Continue as Guest</a>
                <a href="admin.html" id="admin-link" style="display: none;">Admin</a>
                <div class="notification-icon" id="notification-icon">
                    <span class="notification-count" id="notification-count">0</span>
                </div>
                <div class="wishlist-icon" id="wishlist-icon" style="display: none;">
                    <span class="wishlist-count" id="wishlist-count">0</span>
                </div>
                <div id="user-info" style="display: none; align-items: center; gap: 15px;">
                    <span id="username-display">Welcome, </span>
                    <button id="logout-link" class="btn-logout">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <section class="wishlist-page">
        <div class="container">
            <div class="wishlist-hero">
                <div>
                    <h1>Your Wishlist</h1>
                    <p>Keep a curated list of the Vehicles you love. Add from the home page and return here anytime to review, remove, or open vehicle details.</p>
                </div>
                <div>
                    <button class="btn-secondary" onclick="window.location.href='home.html'">Browse Vehicles</button>
                </div>
            </div>

            <div id="wishlist-grid" class="wishlist-grid"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Dealzo. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
