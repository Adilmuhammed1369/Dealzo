<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dealzo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h1>Dealzo</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="active">Login</a>
                <a href="register.html">Register</a>
                <a href="#" id="guest-link">Continue as Guest</a>
                <a href="admin.html" id="admin-link" style="display: none;">Admin</a>
                <div class="notification-icon" id="notification-icon">
                    <span class="notification-count" id="notification-count">0</span>
                </div>
                <div class="wishlist-icon" id="wishlist-icon" style="display: none;">
                    <span class="wishlist-count" id="wishlist-count">0</span>
                </div>
                <div id="user-info" style="display: none; align-items: center; gap: 15px;">
                    <span id="username-display">Welcome, </span>
                    <button id="logout-link" class="btn-logout">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <h2>Login</h2>
                <div id="auth-success" class="auth-success" style="display:none"></div>
                <div id="auth-error" class="auth-error" style="display:none"></div>
                <form id="login-form" action="javascript:void(0);">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </section>

    <script src="js/data.js"></script>
    <script>
        // Auto logout when visiting login page
        if (getCurrentUser()) {
            localStorage.removeItem('currentUser');
        }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
